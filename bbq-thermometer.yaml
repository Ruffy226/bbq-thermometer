# BBQ Meat Thermometer - ESPHome Config
# Target: Xiao ESP32-C6
# Features: NTC probe, SH1106 OLED display, battery monitor, WiFi, Home Assistant
#
# Xiao ESP32-C6 Pinout Reference:
# A0 = GPIO2  A2 = GPIO4
# A1 = GPIO3  A3 = GPIO5
# I2C: D4/D5 (GPIO22/GPIO23)

substitutions:
  name: bbq-thermometer
  friendly_name: BBQ Thermometer

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: HIGH

i2c:
  id: i2c_bus
  sda: GPIO22
  scl: GPIO23
  scan: true
  frequency: 100kHz

# ============================================
# SENSORS
# ============================================

sensor:
  # Raw ADC reading for NTC
  - platform: adc
    id: ntc_adc
    pin: GPIO2
    attenuation: 12db
    update_interval: 30s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  # NTC temperature calculation
  - platform: ntc
    sensor: ntc_adc
    id: meat_temperature
    name: "Meat Temperature"
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    device_class: temperature
    calibration:
      # UPDATE THESE AFTER CALIBRATION
      b_constant: 3950
      reference_resistance: 10000
      reference_temperature: 25°C
    filters:
      - lambda: return x * 1.8 + 32;
    on_value_range:
      - above: 165
        then:
          - logger.log: "Meat reached safe temp (165°F+)!"

  # Battery voltage via voltage divider (2x 10K resistors)
  - platform: adc
    id: battery_adc
    pin: GPIO3
    attenuation: 12db
    update_interval: 5min
    filters:
      - multiply: 2.0
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2

  # Estimated battery percentage from voltage
  - platform: copy
    source_id: battery_adc
    id: battery_level
    name: "Battery Level"
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    filters:
      - lambda: |-
          float v = x;
          if (v >= 4.2) return 100.0f;
          if (v <= 3.0) return 0.0f;
          return ((v - 3.0) / 1.2) * 100.0f;

  # WiFi signal strength
  - platform: wifi_signal
    id: wifi_signal_db
    name: "WiFi Signal"
    update_interval: 10min

  # WiFi signal percentage (for display)
  - platform: copy
    source_id: wifi_signal_db
    id: wifi_signal_percent
    internal: true
    filters:
      - lambda: |-
          int dB = (int)x;
          if (dB <= -100) return 0.0f;
          if (dB >= -50) return 100.0f;
          return (float)(2 * (dB + 100));

# ============================================
# DISPLAY - OLED SH1106
# ============================================

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto"
    id: font_large
    size: 28

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    i2c_id: i2c_bus
    address: 0x3C
    update_interval: 5s
    id: oled
    lambda: |-
      // Title bar
      it.print(0, 0, id(font_small), "BBQ Thermometer");
      it.line(0, 14, 128, 14);

      // Battery and WiFi status row
      it.printf(0, 16, id(font_small), "B:%3.0f%%", id(battery_level).state);
      it.printf(68, 16, id(font_small), "W:%3.0f%%", id(wifi_signal_percent).state);

      // Temperature (large, centered)
      it.printf(64, 44, id(font_large), TextAlign::CENTER, "%.1f°F", id(meat_temperature).state);

# ============================================
# BINARY SENSORS
# ============================================

binary_sensor:
  - platform: status
    name: "Status"

# ============================================
# BUTTONS
# ============================================

button:
  - platform: restart
    name: "Restart"
  - platform: factory_reset
    name: "Factory Reset"

# ============================================
# TEXT SENSORS
# ============================================

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

